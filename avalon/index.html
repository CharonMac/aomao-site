<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿瓦隆 - 联机版</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 1rem; }
    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .header { text-align: center; padding: 1.5rem 0; border-bottom: 1px solid #1e1e3a; margin-bottom: 1.5rem; }
    .header h1 { font-size: 2rem; background: linear-gradient(135deg,#e74c3c,#f39c12); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .header p { color: #888; font-size: 0.85rem; margin-top: 0.3rem; }

    .card { background: #12122a; border: 1px solid #1e1e3a; border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; }
    .card h3 { font-size: 1rem; margin-bottom: 0.8rem; color: #f39c12; }

    input[type="text"] {
      background: #1a1a35; border: 1px solid #2a2a55; border-radius: 8px;
      padding: 0.6rem 1rem; color: #fff; font-size: 0.9rem; width: 100%; outline: none; margin-bottom: 0.5rem;
    }
    input:focus { border-color: #6c5ce7; }

    .btn { display:inline-block; padding:0.7rem 1.5rem; border:none; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer; transition:all 0.3s; color:#fff; }
    .btn-primary { background:linear-gradient(135deg,#6c5ce7,#a855f7); }
    .btn-success { background:linear-gradient(135deg,#22c55e,#16a34a); }
    .btn-danger { background:linear-gradient(135deg,#e74c3c,#dc2626); }
    .btn-outline { background:transparent; border:1px solid #3a3a6a; color:#aaa; }
    .btn:hover { transform:translateY(-2px); box-shadow:0 4px 15px rgba(0,0,0,0.3); }
    .btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
    .btn-group { display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:0.8rem; }

    .player-list { display:flex; flex-wrap:wrap; gap:0.5rem; margin:0.8rem 0; }
    .player-tag {
      padding:0.5rem 0.9rem; border-radius:20px; font-size:0.85rem; cursor:pointer;
      border:2px solid #2a2a55; transition:all 0.3s; user-select:none; background:transparent; color:#ccc;
    }
    .player-tag.selected { border-color:#6c5ce7; background:rgba(108,92,231,0.25); color:#a78bfa; }
    .player-tag.leader { border-color:#f59e0b; }

    .quest-board { display:flex; justify-content:center; gap:0.6rem; margin:1.5rem 0; flex-wrap:wrap; }
    .quest-slot {
      width:60px; height:60px; border-radius:50%; border:3px solid #2a2a55;
      display:flex; flex-direction:column; align-items:center; justify-content:center; font-weight:700; transition:all 0.3s;
    }
    .quest-slot .num { font-size:1.2rem; }
    .quest-slot .size { font-size:0.6rem; color:#888; }
    .quest-slot.current { border-color:#6c5ce7; box-shadow:0 0 15px rgba(108,92,231,0.3); }
    .quest-slot.success { border-color:#22c55e; background:rgba(34,197,94,0.15); }
    .quest-slot.fail { border-color:#e74c3c; background:rgba(231,76,60,0.15); }
    .quest-slot.locked { opacity:0.35; }

    .role-card { text-align:center; padding:2rem; border-radius:16px; margin:1rem 0; }
    .role-card.good { background:linear-gradient(135deg,#0a2a1a,#0f3a20); border:2px solid #22c55e; }
    .role-card.evil { background:linear-gradient(135deg,#2a0a0a,#3a0f0f); border:2px solid #e74c3c; }
    .role-card .emoji { font-size:3rem; margin-bottom:0.5rem; }
    .role-card h2 { font-size:1.4rem; margin-bottom:0.3rem; }
    .role-card p { font-size:0.85rem; color:#aaa; line-height:1.5; }

    .info-panel { background:#1a1a35; border-radius:8px; padding:1rem; margin:0.8rem 0; font-size:0.85rem; line-height:1.7; }
    .info-panel strong { color:#f39c12; }

    .log { max-height:200px; overflow-y:auto; font-size:0.8rem; color:#888; }
    .log div { padding:0.3rem 0; border-bottom:1px solid #1a1a35; }

    .phase {
      text-align:center; padding:0.5rem; border-radius:8px; font-size:0.85rem; font-weight:600;
      margin-bottom:1rem; background:#1a1a35; border:1px solid #2a2a55;
    }

    .toast {
      position:fixed; top:1rem; left:50%; transform:translateX(-50%);
      padding:0.6rem 1.5rem; border-radius:8px; font-size:0.85rem; font-weight:600;
      z-index:1000; color:#fff; animation:toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
    }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-20px)} }
    @keyframes toastOut { to{opacity:0;transform:translateX(-50%) translateY(-20px)} }

    .vote-bar { display:flex; align-items:center; gap:0.5rem; margin:0.3rem 0; font-size:0.85rem; }
    .vote-bar .name { width:70px; text-align:right; color:#aaa; }
    .vote-bar .icon { font-size:1.2rem; }

    .room-code {
      font-size: 2.5rem; font-weight: 700; letter-spacing: 0.3rem; text-align: center;
      background: linear-gradient(135deg, #f59e0b, #e74c3c); -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; margin: 1rem 0;
    }

    .player-waiting {
      display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0;
      border-bottom: 1px solid #1e1e3a; font-size: 0.9rem;
    }
    .player-waiting .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
    .player-waiting .host { color: #f59e0b; font-size: 0.75rem; }

    .status-bar {
      position: fixed; bottom: 0; left: 0; right: 0; padding: 0.5rem 1rem;
      background: #12122a; border-top: 1px solid #1e1e3a; font-size: 0.75rem;
      color: #888; text-align: center; z-index: 100;
    }
    .status-bar .online { color: #22c55e; }
    .status-bar .offline { color: #e74c3c; }

    @media (max-width: 500px) {
      .quest-slot { width: 50px; height: 50px; }
      .quest-slot .num { font-size: 1rem; }
      .room-code { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Menu -->
    <div class="screen active" id="screen-menu">
      <div class="header">
        <h1>⚔️ 阿瓦隆</h1>
        <p>经典社交推理桌游 · 联机版</p>
      </div>
      <div class="card">
        <h3>🎮 开始游戏</h3>
        <input type="text" id="input-name" placeholder="你的名字" maxlength="10">
        <div class="btn-group">
          <button class="btn btn-primary" onclick="createRoom()">🏠 创建房间</button>
          <button class="btn btn-success" onclick="showJoin()">🔗 加入房间</button>
          <button class="btn btn-outline" onclick="startLocal()">📱 本地模式</button>
        </div>
      </div>
      <div class="card" id="join-card" style="display:none">
        <h3>🔗 输入房间号</h3>
        <input type="text" id="input-room" placeholder="6位房间号" maxlength="6" style="text-transform:uppercase;text-align:center;font-size:1.5rem;letter-spacing:0.3rem">
        <div class="btn-group">
          <button class="btn btn-success" onclick="joinRoom()">加入</button>
        </div>
      </div>
      <div class="card">
        <h3>📖 规则</h3>
        <div class="info-panel">
          <strong>阵营：</strong>亚瑟阵营（好人） vs 暗影阵营（坏人）<br>
          <strong>目标：</strong>率先完成3个任务<br>
          <strong>流程：</strong>队长组队 → 全员投票 → 执行任务<br>
          🧙 梅林知道坏人，🗡️ 刺客刺杀梅林可翻盘
        </div>
      </div>
    </div>

    <!-- Lobby -->
    <div class="screen" id="screen-lobby">
      <div class="header">
        <h1>🏠 等待大厅</h1>
        <p id="lobby-role"></p>
      </div>
      <div class="card" id="room-card" style="display:none">
        <h3>📢 分享房间号给朋友</h3>
        <div class="room-code" id="room-code-display"></div>
        <p style="text-align:center;font-size:0.8rem;color:#888">房间号已复制到剪贴板</p>
      </div>
      <div class="card">
        <h3>👥 玩家列表 (<span id="player-count">0</span>/10)</h3>
        <div id="player-waiting-list"></div>
      </div>
      <div class="card">
        <h3>⚙️ 游戏设置</h3>
        <div id="game-settings"></div>
      </div>
      <div class="card" id="local-settings" style="display:none">
        <h3>👥 选择玩家人数</h3>
        <div class="btn-group" id="local-count-btns"></div>
        <div id="local-name-inputs" style="margin-top:0.5rem"></div>
      </div>
    </div>

    <!-- Night -->
    <div class="screen" id="screen-night">
      <div class="header">
        <h1>🌙 夜晚阶段</h1>
        <p id="night-instruction"></p>
      </div>
      <div class="card">
        <button class="btn btn-primary night-reveal-btn" onclick="revealRole()" style="width:100%;font-size:1.1rem;padding:1rem">
          👁️ 点击查看身份
        </button>
        <div id="role-reveal" style="display:none"></div>
        <div class="btn-group" style="margin-top:1rem;display:none" id="night-done-btn">
          <button class="btn btn-success" onclick="nightDone()" style="width:100%">✅ 已记住</button>
        </div>
      </div>
    </div>

    <!-- Game -->
    <div class="screen" id="screen-game">
      <div class="header">
        <h1>⚔️ 第 <span id="round-num">1</span> 轮</h1>
        <p id="game-header-info"></p>
      </div>
      <div class="quest-board" id="quest-board"></div>
      <div class="phase" id="phase-text"></div>

      <div class="card" id="team-card" style="display:none">
        <h3 id="team-title"></h3>
        <div class="player-list" id="team-select"></div>
        <div class="btn-group" id="team-btns"></div>
      </div>

      <div class="card" id="vote-card" style="display:none">
        <h3>🗳️ 投票表决</h3>
        <p style="font-size:0.85rem;color:#aaa;margin-bottom:0.5rem" id="vote-desc"></p>
        <div id="vote-result"></div>
        <div class="btn-group" id="vote-btns"></div>
      </div>

      <div class="card" id="quest-card" style="display:none">
        <h3>⚔️ 执行任务</h3>
        <p style="font-size:0.85rem;color:#aaa;margin-bottom:0.8rem" id="quest-instruction"></p>
        <div class="btn-group" id="quest-btns"></div>
      </div>

      <div class="card">
        <h3>📜 游戏日志</h3>
        <div class="log" id="game-log"></div>
      </div>
    </div>

    <!-- End -->
    <div class="screen" id="screen-end">
      <div class="header"><h1 id="end-title"></h1></div>
      <div class="card" id="end-card"></div>
      <div class="card">
        <h3>📜 完整日志</h3>
        <div class="log" id="end-log"></div>
      </div>
      <div class="btn-group" style="justify-content:center;margin-top:1rem">
        <button class="btn btn-primary" onclick="location.reload()">🔄 再来一局</button>
      </div>
    </div>
  </div>

  <div class="status-bar" id="status-bar" style="display:none">
    <span class="online">●</span> 已连接 · <span id="status-text">在线</span>
  </div>

<script>
// ========== Config ==========
const QUEST={5:[2,3,2,3,3],6:[2,3,4,3,4],7:[2,3,3,4,4],8:[3,4,4,5,5],9:[3,4,4,5,5],10:[3,4,4,5,5]};
const ROLE_CFG={
  5:{good:3,evil:2,sp:['merlin','assassin','mordred','percival']},
  6:{good:4,evil:2,sp:['merlin','assassin','mordred','percival']},
  7:{good:4,evil:3,sp:['merlin','assassin','mordred','morgana','percival']},
  8:{good:5,evil:3,sp:['merlin','assassin','mordred','morgana','oberon']},
  9:{good:6,evil:3,sp:['merlin','assassin','mordred','morgana','oberon','percival']},
  10:{good:6,evil:4,sp:['merlin','assassin','mordred','morgana','oberon','percival']}
};
const ROLES={
  merlin:{n:'梅林',e:'🧙',s:'good',d:'你知道所有坏人（莫德雷德除外），但绝不能暴露！'},
  percival:{n:'忠臣',e:'🛡️',s:'good',d:'你知道梅林是谁。'},
  loyal:{n:'忠臣',e:'⚔️',s:'good',d:'你是亚瑟的忠诚骑士。'},
  assassin:{n:'刺客',e:'🗡️',s:'evil',d:'你负责刺杀梅林！'},
  mordred:{n:'莫德雷德',e:'👹',s:'evil',d:'你是暗影之主，梅林看不到你！'},
  morgana:{n:'莫甘娜',e:'🔮',s:'evil',d:'你冒充梅林迷惑忠臣。'},
  oberon:{n:'奥伯伦',e:'👻',s:'evil',d:'你是独立行动的，其他坏人不知道你。'},
  minion:{n:'爪牙',e:'🦅',s:'evil',d:'你是莫德雷德的爪牙。'}
};

// ========== State ==========
let myName = '', myId = '', isHost = false, isLocal = false;
let roomCode = '', peer = null, conn = null;
let players = [], G = {};
let peerConns = {}; // host: connections to guests
let pendingVotes = {};

// ========== PeerJS ==========
function makeId(prefix) {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let id = prefix;
  for (let i = 0; i < 6; i++) id += chars[Math.floor(Math.random()*chars.length)];
  return id;
}

function genRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c = '';
  for (let i = 0; i < 6; i++) c += chars[Math.floor(Math.random()*chars.length)];
  return c;
}

function createPeer(id) {
  return new Promise((resolve, reject) => {
    const p = new Peer(id, { debug: 0 });
    p.on('open', () => resolve(p));
    p.on('error', e => reject(e));
    setTimeout(() => reject(new Error('连接超时')), 10000);
  });
}

// ========== Create Room ==========
async function createRoom() {
  myName = document.getElementById('input-name').value.trim();
  if (!myName) { toast('请输入名字', '#e74c3c'); return; }

  roomCode = genRoomCode();
  myId = 'av-' + roomCode;
  isHost = true;

  try {
    peer = await createPeer(myId);
  } catch(e) {
    toast('连接失败: ' + e.message, '#e74c3c');
    return;
  }

  players = [{ id: myId, name: myName, host: true }];
  myId = myId;

  peer.on('connection', handleNewConnection);

  show('screen-lobby');
  document.getElementById('lobby-role').textContent = '你是房主';
  document.getElementById('room-card').style.display = 'block';
  document.getElementById('room-code-display').textContent = roomCode;
  document.getElementById('game-settings').innerHTML = `
    <p style="font-size:0.85rem;color:#aaa;margin-bottom:0.5rem">等待玩家加入，选择人数后点击开始</p>
    <div class="btn-group" id="count-btns"></div>
  `;
  const cb = document.getElementById('count-btns');
  for (let i = 5; i <= 10; i++) {
    const b = document.createElement('button');
    b.className = 'btn btn-outline';
    b.textContent = i + '人';
    b.onclick = () => { G.n = i; document.querySelectorAll('#count-btns .btn').forEach(x=>x.className='btn btn-outline'); b.className='btn btn-primary'; checkCanStart(); };
    cb.appendChild(b);
  }

  updateLobby();

  // Try copy to clipboard
  try { navigator.clipboard.writeText(roomCode); } catch(e) {}

  showStatus('房间已创建，等待玩家加入...');
}

function handleNewConnection(c) {
  c.on('open', () => {
    peerConns[c.peer] = c;
    c.on('data', d => handleHostData(c.peer, d));
    // Send current state
    c.send({ type: 'welcome', players, roomCode, n: G.n || 0 });
  });
  c.on('close', () => {
    delete peerConns[c.peer];
    players = players.filter(p => p.id !== c.peer);
    updateLobby();
    broadcast({ type: 'player-left', players });
  });
}

function handleHostData(fromId, data) {
  switch(data.type) {
    case 'join':
      if (players.length >= 10) { return; }
      if (!players.find(p => p.id === fromId)) {
        players.push({ id: fromId, name: data.name, host: false });
        updateLobby();
        broadcast({ type: 'player-joined', players, newPlayer: data.name });
        toast(data.name + ' 加入了房间', '#22c55e');
      }
      break;
    case 'vote':
      handleHostVote(fromId, data);
      break;
    case 'quest-vote':
      handleHostQuestVote(fromId, data);
      break;
  }
}

function checkCanStart() {
  // We'll check when starting
}

function updateLobby() {
  document.getElementById('player-count').textContent = players.length;
  const list = document.getElementById('player-waiting-list');
  list.innerHTML = players.map(p =>
    `<div class="player-waiting"><div class="dot"></div>${p.name}${p.host?'<span class="host">👑 房主</span>':''}</div>`
  ).join('');

  const btns = document.getElementById('team-btns');
  if (isHost) {
    document.getElementById('team-btns') // check if start button exists
  }
}

// ========== Join Room ==========
function showJoin() {
  document.getElementById('join-card').style.display = 'block';
}

async function joinRoom() {
  myName = document.getElementById('input-name').value.trim();
  roomCode = document.getElementById('input-room').value.trim().toUpperCase();
  if (!myName || !roomCode) { toast('请填写完整', '#e74c3c'); return; }

  myId = 'av-' + makeId('G');
  try {
    peer = await createPeer(myId);
  } catch(e) {
    toast('连接失败: ' + e.message, '#e74c3c');
    return;
  }

  conn = peer.connect('av-' + roomCode);
  conn.on('open', () => {
    conn.send({ type: 'join', name: myName });
    conn.on('data', handleGuestData);
  });
  conn.on('error', e => toast('连接错误', '#e74c3c'));

  show('screen-lobby');
  document.getElementById('lobby-role').textContent = '等待房主开始...';
  document.getElementById('room-card').style.display = 'none';
  document.getElementById('game-settings').innerHTML = '<p style="font-size:0.85rem;color:#aaa">等待房主开始游戏...</p>';
  showStatus('已连接到房间 ' + roomCode);
}

function handleGuestData(data) {
  switch(data.type) {
    case 'welcome':
      players = data.players;
      G.n = data.n;
      updateLobby();
      break;
    case 'player-joined':
    case 'player-left':
      players = data.players;
      updateLobby();
      if (data.newPlayer) toast(data.newPlayer + ' 加入了', '#22c55e');
      break;
    case 'game-start':
      G = data.G;
      players = data.players;
      myRole = data.myRole;
      myIdx = data.myIdx;
      showNightOnline();
      break;
    case 'all-roles-seen':
      G.phase = 'team';
      startTeamOnline();
      break;
    case 'team-selected':
      G.team = data.team;
      G.leader = data.leader;
      startVoteOnline();
      break;
    case 'vote-result':
      showVoteResultOnline(data);
      break;
    case 'start-quest':
      startQuestOnline();
      break;
    case 'quest-vote-request':
      showQuestVoteOnline();
      break;
    case 'quest-result':
      showQuestResultOnline(data);
      break;
    case 'game-over':
      showGameOverOnline(data);
      break;
    case 'toast':
      toast(data.msg, data.color || '#6c5ce7');
      break;
    case 'log':
      addLog(data.text);
      break;
  }
}

// ========== Local Mode ==========
function startLocal() {
  isLocal = true;
  myName = document.getElementById('input-name').value.trim() || '主持人';
  show('screen-lobby');
  document.getElementById('lobby-role').textContent = '本地模式 · ' + myName;
  document.getElementById('room-card').style.display = 'none';
  document.getElementById('game-settings').style.display = 'none';
  document.getElementById('local-settings').style.display = 'block';

  const cb = document.getElementById('local-count-btns');
  for (let i = 5; i <= 10; i++) {
    const b = document.createElement('button');
    b.className = 'btn btn-outline';
    b.textContent = i + '人';
    b.onclick = () => {
      G.n = i;
      document.querySelectorAll('#local-count-btns .btn').forEach(x=>x.className='btn btn-outline');
      b.className = 'btn btn-primary';
      buildLocalInputs(i);
    };
    cb.appendChild(b);
  }
}

function buildLocalInputs(n) {
  const c = document.getElementById('local-name-inputs');
  c.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = '玩家 ' + (i+1);
    inp.id = 'lp'+i;
    c.appendChild(inp);
  }
  c.innerHTML += '<div class="btn-group"><button class="btn btn-primary" onclick="startLocalGame()">🎮 开始游戏</button></div>';
}

function startLocalGame() {
  players = [];
  for (let i = 0; i < G.n; i++) {
    const name = document.getElementById('lp'+i).value.trim() || ('玩家'+(i+1));
    players.push({ name, alive:true, role:null });
  }
  assignRolesLocal();
  Object.assign(G, { round:1, leader:0, results:[], okCount:0, failCount:0, rejects:0, log:[], nightIdx:0, team:[], votes:[], phase:'night' });
  show('screen-night');
  showNightLocal();
}

function assignRolesLocal() {
  const cfg = ROLE_CFG[G.n];
  let pool = [...cfg.sp];
  const gS = pool.filter(r=>ROLES[r].s==='good').length;
  const eS = pool.filter(r=>ROLES[r].s==='evil').length;
  for (let i=0;i<cfg.good-gS;i++) pool.push('loyal');
  for (let i=0;i<cfg.evil-eS;i++) pool.push('minion');
  shuffle(pool);
  const idx = players.map((_,i)=>i);
  shuffle(idx);
  for (let i=0;i<pool.length;i++) players[idx[i]].role = pool[i];
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function castVoteLocal(yes) {
  G.votes.push(yes);
  localVoteCount++;
  if (localVoteCount < players.length) {
    toast(localVoteCount + '/' + players.length + ' 已投票','#6c5ce7');

  }
  const res = document.getElementById('vote-result');
  res.innerHTML = G.votes.map((v,i)=>'<div class="vote-bar"><span class="name">'+players[i].name+'</span><span class="icon">'+(v?'👍':'👎')+'</span></div>').join('');

  localVoteCount = 0;

  setTimeout(() => {
    if (y > n) { startQuestLocal(); }
    else {
      G.rejects++;
      addLog('❌ 队伍被否决！');
      if (G.rejects >= 5) { endGameLocal(false,'否决次数过多'); return; }

function showQuestPlayerLocal() {
  if (G.questIdx >= G.team.length) { finishQuestLocal(); return; }
  const idx = G.team[G.questIdx];
  const p = players[idx];
  const isEvil = ROLES[p.role].s === 'evil';
  document.getElementById('quest-instruction').textContent = p.name + ' 请投票：';
  const btns = document.getElementById('quest-btns');
  btns.innerHTML = '<button class="btn btn-success" onclick="qVoteLocal(true,'+isEvil+')">✅ 成功</button>';
  if (isEvil) btns.innerHTML += ' <button class="btn btn-danger" onclick="qVoteLocal(false,true)">❌ 失败</button>';
}

function qVoteLocal(success, isEvil) {
  if (!isEvil) success = true;
  G.questVotes.push(success);
  G.questIdx++;
  showQuestPlayerLocal();
}

function finishQuestLocal() {
  const fails = G.questVotes.filter(v=>!v).length;
  const ok = fails === 0;
  G.results.push(ok);
  if (ok) { G.okCount++; addLog('✅ 任务成功！'); }
  else { G.failCount++; addLog('❌ 任务失败！('+fails+'票反对)'); }
  renderBoardLocal();

  if (G.okCount >= 3) { setTimeout(()=>endGameLocal(true,'亚瑟阵营完成3个任务！'),1500); return; }
  if (G.failCount >= 3) { setTimeout(()=>endGameLocal(false,'暗影阵营破坏了3个任务！'),1500); return; }

  G.round++;
  nextLeaderLocal();
  setTimeout(startTeamLocal, 1500);
}

// ========== Host game logic ==========
async function hostStartGame() {
  if (!G.n || players.length < G.n) { toast('玩家人数不足', '#e74c3c'); return; }
  assignRolesLocal();
  Object.assign(G, { round:1, leader:0, results:[], okCount:0, failCount:0, rejects:0, team:[], votes:[], phase:'night' });

  // Send each player their role
  const playerInfos = players.map((p,i) => ({ id: p.id, name: p.name, role: p.role, idx: i }));
  for (const pi of playerInfos) {
    const c = peerConns[pi.id];
    if (c) c.send({ type: 'game-start', G: { n:G.n, round:G.round, leader:G.leader, results:G.results, okCount:G.okCount, failCount:G.failCount, rejects:G.rejects }, players: playerInfos, myRole: pi.role, myIdx: pi.idx });
  }
  // Host also sees night
  myRole = players[0].role;
  myIdx = 0;
  players.forEach(p => { if (!p.id) p.alive = true; p.role = ROLE_CFG[G.n] ? p.role : null; });
  show('screen-night');
  document.getElementById('night-instruction').innerHTML = '你的角色';
  document.getElementById('role-reveal').style.display = 'none';
  document.getElementById('night-done-btn').style.display = 'none';
  document.querySelector('.night-reveal-btn').style.display = 'block';
}

function handleHostVote(fromId, data) {
  if (!pendingVotes.votes) pendingVotes = { votes: {}, count: 0 };
  pendingVotes.votes[fromId] = data.yes;
  pendingVotes.count++;

  if (pendingVotes.count >= players.length) {
    const voteArr = players.map(p => pendingVotes.votes[p.id] !== false);
    const y = voteArr.filter(v=>v).length;
    const approved = y > players.length / 2;

    // Broadcast result
    broadcast({ type: 'vote-result', votes: voteArr.map((v,i) => v), approved });
    addLog('投票：'+y+'同意 '+(players.length-y)+'反对');

    pendingVotes = {};

    if (approved) {
      // Start quest phase
      setTimeout(() => broadcast({ type: 'start-quest' }), 2500);
    } else {
      G.rejects++;
      addLog('❌ 队伍被否决！');
      if (G.rejects >= 5) { broadcast({ type: 'game-over', goodWin:false, reason:'否决次数过多', roles: players.map(p=>({name:p.name,role:p.role})) }); return; }
      G.leader = (G.leader+1)%players.length;
      setTimeout(() => broadcast({ type: 'all-roles-seen' }), 2500);
    }
  }
}

function handleHostQuestVote(fromId, data) {
  if (!pendingVotes.qVotes) pendingVotes = { qVotes: [], count: 0 };
  pendingVotes.qVotes.push(data.success);
  pendingVotes.count++;

  if (pendingVotes.count >= G.team.length) {
    const fails = pendingVotes.qVotes.filter(v=>!v).length;
    const ok = fails === 0;
    G.results.push(ok);
    if (ok) G.okCount++; else G.failCount++;
    addLog(ok ? '✅ 任务成功！' : '❌ 任务失败！('+fails+'票反对)');

    const gameOver = G.okCount >= 3 || G.failCount >= 3;
    const goodWin = G.okCount >= 3;
    const reason = goodWin ? '亚瑟阵营完成3个任务！' : '暗影阵营破坏了3个任务！';

    broadcast({ type: 'quest-result', ok, gameOver, goodWin, reason, G: { round:G.round, results:G.results, okCount:G.okCount, failCount:G.failCount } });
    pendingVotes = {};

    if (gameOver) {
      setTimeout(() => broadcast({ type: 'game-over', goodWin, reason, roles: players.map(p=>({name:p.name,role:p.role})) }), 2500);
    } else {
      G.round++;
      G.leader = (G.leader+1)%players.length;
    }
  }
}

function addHostStartBtn() {
  const s = document.getElementById('game-settings');
  if (s && isHost) {
    const btnDiv = document.createElement('div');
    btnDiv.className = 'btn-group';
    btnDiv.innerHTML = '<button class="btn btn-primary" onclick="hostStartGame()" style="margin-top:0.5rem">🎮 开始游戏</button>';
    s.appendChild(btnDiv);
  }
}

// ========== Utils ==========
function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function toast(msg, bg) { const d=document.createElement('div'); d.className='toast'; d.textContent=msg; d.style.background=bg||'#22c55e'; document.body.appendChild(d); setTimeout(()=>d.remove(),2500); }
function addLog(t) { G.log = G.log || []; G.log.push(t); const l=document.getElementById('game-log'); if(l){l.innerHTML=G.log.map(x=>'<div>'+x+'</div>').join(''); l.scrollTop=l.scrollHeight;} }
function broadcast(data) { Object.values(peerConns).forEach(c => { try{c.send(data)}catch(e){} }); }
function showStatus(msg) { document.getElementById('status-bar').style.display='block'; document.getElementById('status-text').textContent=msg; }
